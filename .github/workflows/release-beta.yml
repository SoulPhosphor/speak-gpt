name: Release Beta APK

on:
  push:
    branches:
      - claude/lore-book-memory-system-Asewt
  workflow_dispatch:

concurrency:
  group: release-beta-apk
  cancel-in-progress: true

jobs:
  build-and-release-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26d + CMake 3.22
        run: |
          set -e
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build Beta APK
        run: ./gradlew --no-daemon assembleBeta

      - name: Rename APK
        run: cp app/build/outputs/apk/beta/app-beta.apk phosphor-shines-beta.apk

      - name: Write release notes
        run: |
          cat > notes.md << 'NOTES'
          ## Phosphor Shines — Beta (lorebook / memory system)

          This is a **beta** build. It installs **alongside** the stable app
          (different app name and package), so you can run both at once.

          ### How to install
          1. Click **phosphor-shines-beta.apk** below to download it
          2. Open this page on your phone, or transfer the file to it
          3. Tap the downloaded file to install it
          4. If your phone asks about installing from unknown sources, tap Allow

          The beta appears on your home screen as **Phosphor Beta**.
          NOTES

      - name: Delete existing beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete beta --yes 2>/dev/null || true
          git push origin :refs/tags/beta 2>/dev/null || true

      - name: Publish beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create beta phosphor-shines-beta.apk \
            --title "Phosphor Shines (Beta)" \
            --notes-file notes.md \
            --prerelease
