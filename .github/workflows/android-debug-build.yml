name: Android debug APK

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install required Android SDK components
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --info 2>&1 | tee gradle-output.log

      - name: Show failure tail
        if: failure()
        run: |
          echo "===== last 400 lines of gradle output ====="
          tail -n 400 gradle-output.log || true

      - name: Upload Gradle output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-output-${{ github.sha }}
          path: gradle-output.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: speakgpt-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30
