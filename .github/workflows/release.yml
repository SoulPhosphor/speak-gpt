name: Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-apk
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Debug-signed APKs must never be published as releases: the debug
      # keystore and its password are public in this repo, so anyone could
      # build an APK that installs over a user's copy. Releases are built
      # with assembleRelease and signed with a private key supplied via
      # repository secrets. Until those secrets are configured, this
      # workflow stops here instead of publishing.
      - name: Check release signing secrets
        id: signing
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASS: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          if [ -z "$KS" ] || [ -z "$KS_PASS" ] || [ -z "$KEY_ALIAS" ] || [ -z "$KEY_PASS" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Release publishing is disabled: signing secrets are not configured. Set RELEASE_KEYSTORE_BASE64 (base64 of a private keystore), RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS and RELEASE_KEY_PASSWORD in the repository secrets to enable signed releases. Debug-signed APKs are intentionally no longer published."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 21 (Temurin)
        if: steps.signing.outputs.configured == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Set up Android SDK
        if: steps.signing.outputs.configured == 'true'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK r26d + CMake 3.22
        if: steps.signing.outputs.configured == 'true'
        run: |
          set -e
          sdkmanager --install "ndk;26.3.11579264" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.3.11579264" >> "$GITHUB_ENV"

      - name: Make Gradle wrapper executable
        if: steps.signing.outputs.configured == 'true'
        run: chmod +x ./gradlew

      - name: Decode release keystore
        if: steps.signing.outputs.configured == 'true'
        env:
          KS: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KS" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        if: steps.signing.outputs.configured == 'true'
        run: ./gradlew --no-daemon assembleRelease

      - name: Rename APK
        if: steps.signing.outputs.configured == 'true'
        run: cp app/build/outputs/apk/release/app-release.apk phosphor-shines.apk

      - name: Write release notes
        if: steps.signing.outputs.configured == 'true'
        run: |
          cat > notes.md << 'NOTES'
          ## How to install Phosphor Shines on your Android phone

          1. Click **phosphor-shines.apk** below to download it
          2. Transfer the file to your Android phone (or open this page on your phone and download directly)
          3. Tap the downloaded file to install it
          4. If your phone asks about installing from unknown sources, tap Allow
          NOTES

      - name: Delete existing latest release
        if: steps.signing.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true

      - name: Publish release
        if: steps.signing.outputs.configured == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest phosphor-shines.apk \
            --title "Phosphor Shines (Latest Build)" \
            --notes-file notes.md \
            --latest
